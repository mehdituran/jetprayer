version: '3.8'

services:
    db:
        image: mariadb:10.11
        container_name: jetprayer-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: jetprayer_root_pass
            MYSQL_DATABASE: wordpress
            MYSQL_USER: wordpress
            MYSQL_PASSWORD: jetprayer_db_pass
        volumes:
            - db_data:/var/lib/mysql

    wordpress:
        depends_on:
            - db
        image: wordpress:latest
        container_name: jetprayer
        restart: always
        ports:
            - '8080:80'
        environment:
            WORDPRESS_DB_HOST: db:3306
            WORDPRESS_DB_USER: wordpress
            WORDPRESS_DB_PASSWORD: jetprayer_db_pass
            WORDPRESS_DB_NAME: wordpress
        volumes:
            - wordpress_data:/var/www/html
            - .:/var/www/html/wp-content/plugins/jetprayer

volumes:
    db_data:
    wordpress_data:
